<svg viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08B050" />
      <stop offset="100%" stop-color="#00C6B8" />
    </linearGradient>
  </defs>
  <g transform="translate(5, 0)">
    {/* Head: green-teal oval */}
    <ellipse cx="25" cy="14" rx="4.5" ry="7" fill="url(#logo-grad)" />
    
    {/* Arms: curved branches stretching up and out */}
    <path d="M 6,18 C 14,27 20,29 25,29 C 30,29 36,27 44,18" stroke="url(#logo-grad)" stroke-width="3.5" stroke-linecap="round" />
    
    {/* Trunk: curved stem */}
    <path d="M 25,29 C 23,39 19,45 23,52" stroke="url(#logo-grad)" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
